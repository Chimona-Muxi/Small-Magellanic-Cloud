<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title data-i18n="page.title.analysis">数学分析学习辅助器 · Small Magellanic Cloud</title>
  <link rel="icon" href="/favicon.png" type="image/png" />
  <link rel="stylesheet" href="/styles.css?v=20260704h" />
</head>
<body>
  <div class="site-shell">
    <header class="site-header">
      <a class="brand" href="/">
        <span class="brand-text"><strong>Small Magellanic Cloud</strong></span>
      </a>
      <nav class="site-nav trail" aria-label="当前位置" data-i18n-aria-label="nav.breadcrumb">
        <a href="/" data-i18n="nav.home">主页</a>
        <span>/</span>
        <a href="/study/" data-i18n="nav.study">学习工具</a>
        <div class="settings-menu" data-settings-menu-root>
          <button class="settings-trigger" type="button" data-settings-toggle data-i18n="settings.label" data-i18n-aria-label="settings.label" aria-expanded="false" aria-label="设置">设置</button>
          <div class="settings-popover" data-settings-menu>
            <div class="settings-field">
              <span data-i18n="settings.language">语言：</span>
              <select data-language-select aria-label="选择语言"></select>
            </div>
            <div class="settings-field">
              <span data-i18n="settings.appearance">外观：</span>
              <select data-theme-select aria-label="选择外观"></select>
            </div>
          </div>
        </div>
      </nav>
    </header>

    <main class="content-band compact">
      <div class="page-title" data-reveal>
        <p class="eyebrow" data-i18n="study.core.eyebrow">原项目核心</p>
        <h1 data-i18n="study.analysis.title">数学分析学习辅助器</h1>
        <p data-i18n="study.analysis.copy">直接调用原 GeoGebra CAS 风格 Python 项目，处理极限、导数、积分、级数、方程、ODE、收敛判别、多元函数与 Fourier/Laplace 工具。</p>
        <p class="study-guide-entry"><a href="/study/analysis/manual/" data-i18n="guide.open">使用指南</a></p>
      </div>

      <section class="study-workbench" data-python-tool data-tool="analysis" data-endpoint="/api/study/analysis/evaluate" data-reveal>
        <form class="study-form" data-tool-form>
          <label class="study-editor-label">
            <span data-i18n="tool.input">输入文件内容</span>
            <textarea class="study-editor" data-tool-input spellcheck="false" autocomplete="off"></textarea>
          </label>
          <div class="study-actions">
            <div class="quick-examples" aria-label="示例" data-i18n-aria-label="tool.examples">
              <button type="button" data-example="cas" data-i18n="analysis.example.cas">CAS 基础</button>
              <button type="button" data-example="convergence" data-i18n="analysis.example.convergence">收敛判别</button>
              <button type="button" data-example="series" data-i18n="analysis.example.series">级数与傅里叶</button>
              <button type="button" data-example="ode" data-i18n="analysis.example.ode">方程与 ODE</button>
              <button type="button" data-example="multivar" data-i18n="analysis.example.multivar">多元函数</button>
            </div>
            <button class="button primary tool-submit" type="submit" data-tool-submit data-i18n="tool.run">运行</button>
          </div>
        </form>

        <section class="study-output-panel" aria-live="polite">
          <h2 data-i18n="tool.output">运行输出</h2>
          <pre class="padic-output terminal-output study-output" data-tool-output></pre>
        </section>
      </section>
    </main>
  </div>
  <script type="module" src="/site.mjs?v=20260704h"></script>
  <script type="module" src="/study/python-tool.mjs?v=20260704h"></script>
</body>
</html>
