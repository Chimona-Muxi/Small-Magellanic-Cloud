<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>我的私人空间 · Small Magellanic Cloud</title>
  <meta name="description" content="Small Magellanic Cloud private space." />
  <link rel="icon" href="/favicon.png" type="image/png" />
  <link rel="stylesheet" href="/styles.css?v=20260706b" />
</head>
<body>
  <div class="site-shell">
    <header class="site-header">
      <a class="brand" href="/" aria-label="Small Magellanic Cloud">
        <span class="brand-text">
          <strong>Small Magellanic Cloud</strong>
          <span data-i18n="site.subtitle">个人网站</span>
        </span>
      </a>
      <nav class="site-nav trail" aria-label="当前位置" data-i18n-aria-label="nav.breadcrumb">
        <a href="/" data-i18n="nav.home">主页</a>
        <span>/</span>
        <span class="current" data-i18n="nav.private">私人空间</span>
        <div class="settings-menu" data-settings-menu-root>
          <button class="settings-trigger" type="button" data-settings-toggle data-i18n="settings.label" aria-expanded="false" aria-label="设置">设置</button>
          <div class="settings-popover" data-settings-menu>
            <div class="settings-field">
              <span data-i18n="settings.language">语言：</span>
              <select data-language-select aria-label="Language"></select>
            </div>
            <div class="settings-field">
              <span data-i18n="settings.appearance">外观：</span>
              <select data-theme-select aria-label="Appearance"></select>
            </div>
          </div>
        </div>
      </nav>
    </header>

    <main class="private-main">
      <section class="private-gate" data-private-gate data-reveal>
        <p class="eyebrow" data-i18n="private.gate.eyebrow">private space</p>
        <h1 data-i18n="private.gate.title">我的私人空间</h1>
        <p data-i18n="private.gate.copy">输入密码后进入。这里暂时只放自我简介，后面的内容之后再补。</p>
        <form class="private-form" data-private-form>
          <label for="private-password" data-i18n="private.password.label">密码</label>
          <div class="private-password-row">
            <input id="private-password" type="password" autocomplete="current-password" data-private-password data-i18n-placeholder="private.password.placeholder" placeholder="输入密码" />
            <button class="button primary private-submit" type="submit" data-i18n="private.enter">进入私人空间</button>
          </div>
          <label class="private-remember">
            <input type="checkbox" data-private-remember />
            <span data-i18n="private.remember">记住此登录设备</span>
          </label>
          <p class="private-error" data-private-error role="alert" aria-live="polite"></p>
        </form>
      </section>

      <section class="private-space private-layout" data-private-space hidden>
        <aside class="private-sidebar" data-reveal>
          <div class="private-sidebar-id">
            <div class="private-sidebar-avatar" aria-hidden="true">墨</div>
            <div>
              <strong data-profile-name-side></strong>
              <span data-i18n="nav.private">私人空间</span>
            </div>
          </div>
          <nav class="private-side-nav" aria-label="私人空间导航" data-i18n-aria-label="private.nav.label">
            <button class="private-nav-button active" type="button" data-private-nav="profile" aria-pressed="true">
              <span class="private-nav-mark" aria-hidden="true"></span>
              <span data-i18n="private.nav.profile">自我简介</span>
            </button>
            <button class="private-nav-button" type="button" data-private-nav="security" aria-pressed="false">
              <span class="private-nav-mark" aria-hidden="true"></span>
              <span data-i18n="private.nav.security">安全登录</span>
            </button>
            <button class="private-nav-button" type="button" data-private-nav="data" aria-pressed="false">
              <span class="private-nav-mark" aria-hidden="true"></span>
              <span data-i18n="private.nav.data">数据管理</span>
            </button>
          </nav>
        </aside>

        <div class="private-panel-stack">
          <article class="private-panel profile-panel" data-private-panel="profile" data-reveal>
            <div class="profile-head">
              <div class="profile-avatar" aria-hidden="true">墨</div>
              <div class="profile-title">
                <p class="eyebrow" data-i18n="private.profile.eyebrow">self introduction</p>
                <h1 data-profile-name></h1>
                <p data-profile-birthday></p>
              </div>
              <div class="profile-actions">
                <button class="button" type="button" data-profile-edit data-i18n="private.profile.edit">编辑</button>
                <button class="button primary" type="button" data-profile-save hidden data-i18n="private.profile.save">保存</button>
              </div>
            </div>

            <div class="profile-body" data-profile-view>
              <div>
                <span data-i18n="private.profile.nameLabel">姓名</span>
                <strong data-profile-name-copy></strong>
              </div>
              <div>
                <span data-i18n="private.profile.birthLabel">出生</span>
                <strong data-profile-birthday-copy></strong>
              </div>
              <p data-profile-note></p>
            </div>

            <form class="profile-editor" data-profile-editor hidden>
              <label>
                <span data-i18n="private.profile.nameLabel">姓名</span>
                <input type="text" data-profile-name-input />
              </label>
              <label>
                <span data-i18n="private.profile.birthLabel">出生</span>
                <input type="text" data-profile-birthday-input />
              </label>
              <label>
                <span data-i18n="private.profile.noteLabel">简介</span>
                <textarea rows="4" data-profile-note-input></textarea>
              </label>
            </form>
            <p class="profile-save-status" data-profile-save-status role="status" aria-live="polite"></p>
          </article>

          <article class="private-panel devices-panel" data-private-panel="security" data-reveal hidden>
            <div class="devices-head">
              <div>
                <p class="eyebrow" data-i18n="private.devices.eyebrow">trusted devices</p>
                <h2 data-i18n="private.devices.title">登录设备管理</h2>
              </div>
              <button class="button" type="button" data-devices-refresh data-i18n="private.devices.refresh">刷新</button>
            </div>
            <div class="devices-list" data-devices-list></div>
            <div class="security-actions">
              <button class="button subtle" type="button" data-devices-revoke-others data-i18n="private.devices.revokeOthers">移除其他设备</button>
              <button class="button subtle danger" type="button" data-private-lock data-i18n="private.lock">退出</button>
            </div>
          </article>

          <article class="private-panel data-panel" data-private-panel="data" data-reveal hidden>
            <div class="data-head">
              <p class="eyebrow" data-i18n="private.data.eyebrow">data archive</p>
              <h2 data-i18n="private.data.title">数据管理</h2>
            </div>
            <div class="data-menu-grid">
              <div class="data-menu-group">
                <button class="data-menu-trigger" type="button" data-data-menu="save" aria-expanded="false" data-i18n="private.data.save">保存</button>
                <div class="data-menu-options" data-data-menu-panel="save" hidden>
                  <button type="button" data-data-action="export-local" data-i18n="private.data.exportLocal">保存信息至本地</button>
                  <button type="button" data-data-action="export-subsite" data-i18n="private.data.exportSubsite">传输信息至子网站</button>
                </div>
              </div>
              <div class="data-menu-group">
                <button class="data-menu-trigger" type="button" data-data-menu="import" aria-expanded="false" data-i18n="private.data.import">导入</button>
                <div class="data-menu-options" data-data-menu-panel="import" hidden>
                  <button type="button" data-data-action="import-local" data-i18n="private.data.importLocal">从本地导入</button>
                  <button type="button" data-data-action="import-subsite" data-i18n="private.data.importSubsite">从子网站导入</button>
                </div>
              </div>
            </div>
            <p class="data-status" data-data-status role="status" aria-live="polite"></p>
          </article>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <span>Small Magellanic Cloud</span>
      <span data-i18n="footer.built">一个持续生长的个人网站。</span>
    </footer>
  </div>
  <script type="module" src="/private/private.mjs?v=20260706b"></script>
</body>
</html>
