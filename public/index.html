<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Small Magellanic Cloud</title>
  <meta name="description" content="Small Magellanic Cloud personal site." />
  <link rel="stylesheet" href="/styles.css?v=20260704h" />
</head>
<body>
  <div class="site-shell">
    <header class="site-header">
      <a class="brand" href="/" aria-label="Small Magellanic Cloud">
        <span class="brand-text">
          <strong>Small Magellanic Cloud</strong>
          <span data-i18n="site.subtitle">个人网站</span>
        </span>
      </a>
      <nav class="site-nav" aria-label="主导航">
        <span class="current" data-i18n="nav.home">主页</span>
        <div class="settings-menu" data-settings-menu-root>
          <button class="settings-trigger" type="button" data-settings-toggle data-i18n="settings.label" aria-expanded="false" aria-label="设置">设置</button>
          <div class="settings-popover" data-settings-menu>
            <div class="settings-field">
              <span data-i18n="settings.language">语言：</span>
              <select data-language-select aria-label="Language"></select>
            </div>
            <div class="settings-field">
              <span data-i18n="settings.appearance">外观：</span>
              <select data-theme-select aria-label="Appearance"></select>
            </div>
          </div>
        </div>
      </nav>
    </header>

    <main>
      <section class="hero">
        <div class="hero-inner" data-reveal>
          <p class="eyebrow" data-i18n="home.eyebrow">private site</p>
          <h1>Small Magellanic Cloud</h1>
          <p class="hero-copy" data-i18n="home.copy">张墨霖的私人网站，用于日常生活、学习，欢迎参观。</p>
        </div>
      </section>

      <section class="content-band" id="modules">
        <div class="section-head" data-reveal>
          <h2 data-i18n="home.modules.title">我的公开创作作品</h2>
          <p data-i18n="home.modules.copy">网站存放了我认为有一定价值的项目，包括游戏、学习工具、资源库等等。</p>
        </div>
        <div class="module-grid">
          <a class="module-card" href="/game/" data-reveal>
            <h3 data-i18n="module.game.title">游戏</h3>
            <p data-i18n="module.game.copy">棋类与互动游戏的集合，目前先收纳棋类模块。</p>
          </a>
          <a class="module-card" href="/study/" data-reveal>
            <h3 data-i18n="module.study.title">学习工具</h3>
            <p data-i18n="module.study.copy">p进数转换、终端工具和后续学习实验会收纳在这里。</p>
          </a>
          <article class="module-card" data-reveal>
            <h3 data-i18n="module.lab.title">实验室</h3>
            <p data-i18n="module.lab.copy">用于保存阶段性作品、算法实验和可复用组件。</p>
          </article>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <span>Small Magellanic Cloud</span>
      <span data-i18n="footer.built">一个持续生长的个人网站。</span>
    </footer>
  </div>
  <script type="module" src="/site.mjs?v=20260704h"></script>
</body>
</html>
