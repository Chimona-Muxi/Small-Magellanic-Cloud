<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>棋类 · Small Magellanic Cloud</title>
  <link rel="stylesheet" href="/styles.css?v=20260701b" />
</head>
<body>
  <div class="site-shell">
    <header class="site-header">
      <a class="brand" href="/">
        <span class="brand-text"><strong>Small Magellanic Cloud</strong></span>
      </a>
      <nav class="site-nav trail" aria-label="当前位置">
        <a href="/" data-i18n="nav.home">主页</a>
        <span>/</span>
        <a href="/game/" data-i18n="nav.game">游戏</a>
        <div class="settings-menu" data-settings-menu-root>
          <button class="settings-trigger" type="button" data-settings-toggle data-i18n="settings.label" aria-expanded="false" aria-label="设置">设置</button>
          <div class="settings-popover" data-settings-menu>
            <div class="settings-field">
              <span data-i18n="settings.language">语言：</span>
              <select data-language-select aria-label="Language"></select>
            </div>
            <div class="settings-field">
              <span data-i18n="settings.appearance">外观：</span>
              <select data-theme-select aria-label="Appearance"></select>
            </div>
          </div>
        </div>
      </nav>
    </header>

    <main class="content-band compact">
      <div class="page-title" data-reveal>
        <h1 data-i18n="board.title">棋类</h1>
        <p data-i18n="board.copy">目前的棋类项目以发布版方式收纳在这里，开发仍保留在各自原仓库中。</p>
      </div>

      <div class="board-grid">
        <a class="game-card" href="/game/board/luqiangqi/" data-reveal>
          <div class="game-visual"><span class="mini-board luqiangqi" aria-hidden="true"></span></div>
          <div class="game-body">
            <h3 data-i18n="board.luqiangqi.title">路墙棋</h3>
            <p data-i18n="board.luqiangqi.copy">以通路、围堵和空间压迫为核心，适合慢慢读局。</p>
          </div>
        </a>

        <a class="game-card" href="/game/board/xiyangtiaoqi/" data-reveal>
          <div class="game-visual"><span class="mini-board" aria-hidden="true"></span></div>
          <div class="game-body">
            <h3 data-i18n="board.xiyangtiaoqi.title">西洋跳棋</h3>
            <p data-i18n="board.xiyangtiaoqi.copy">强制吃子与连跳让每一步都带着交换计算。</p>
          </div>
        </a>

        <a class="game-card" href="/game/board/tuerqitiaoqi/" data-reveal>
          <div class="game-visual"><span class="mini-board tuerqitiaoqi" aria-hidden="true"></span></div>
          <div class="game-body">
            <h3 data-i18n="board.tuerqitiaoqi.title">土耳其跳棋</h3>
            <p data-i18n="board.tuerqitiaoqi.copy">横纵移动、最大吃子和长王路线带来更开阔的战术。</p>
          </div>
        </a>
      </div>
    </main>
  </div>
  <script type="module" src="/site.mjs?v=20260701b"></script>
</body>
</html>
