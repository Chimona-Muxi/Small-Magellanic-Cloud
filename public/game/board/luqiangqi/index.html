<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>墙路棋</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <a class="site-back" href="/game/board/" data-i18n="nav.board">棋类</a>
    <div class="settings-menu game-settings" data-settings-menu-root>
      <button class="settings-trigger" type="button" data-settings-toggle data-i18n="settings.label" aria-expanded="false" aria-label="设置">设置</button>
      <div class="settings-popover" data-settings-menu>
        <label class="settings-field">
          <span data-i18n="settings.language">语言：</span>
          <select data-language-select aria-label="Language"></select>
        </label>
        <label class="settings-field">
          <span data-i18n="settings.appearance">外观：</span>
          <select data-theme-select aria-label="Appearance"></select>
        </label>
      </div>
    </div>
    <main class="app-shell">
      <aside class="panel side-panel">
        <div class="brand">
          <span class="brand-mark"></span>
          <div>
            <h1 data-i18n="luqiangqi.title">墙路棋</h1>
            <p id="gameSubtitle">人机对弈</p>
          </div>
        </div>

        <div class="segmented" id="modeTabs" aria-label="模式">
          <button class="active" data-mode="ai" data-i18n="common.mode.ai">人机</button>
          <button data-mode="local" data-i18n="common.mode.local">同屏</button>
          <button data-mode="online" data-i18n="common.mode.online">联机</button>
        </div>

        <section class="control-block" id="setupPanel">
          <label class="field" id="playerCountField">
            <span data-i18n="common.roomPlayers">人数</span>
            <select id="playerCountSelect">
              <option value="2">2 人</option>
              <option value="3">3 人</option>
              <option value="4">4 人</option>
            </select>
          </label>

          <label class="field" id="difficultyField">
            <span data-i18n="common.aiStrength">AI 强度</span>
            <select id="difficultySelect">
              <option value="easy" data-i18n="difficulty.easy">轻松</option>
              <option value="steady" selected data-i18n="difficulty.steady">稳健</option>
              <option value="hard" data-i18n="difficulty.hard">强手</option>
            </select>
          </label>

          <button class="primary" id="newGameButton" data-i18n="common.newGame">新开一局</button>
        </section>

        <section class="control-block online-panel hidden" id="onlinePanel">
          <div class="online-step" id="onlineHomeStep">
            <label class="field">
              <span data-i18n="common.nickname">昵称</span>
              <input id="onlineNameInput" maxlength="14" placeholder="我的名字" data-i18n-placeholder="common.namePlaceholder" />
            </label>
            <label class="field">
              <span data-i18n="common.roomPlayers">房间人数</span>
              <select id="onlinePlayerCountSelect">
                <option value="2">2 人</option>
                <option value="3">3 人</option>
                <option value="4">4 人</option>
              </select>
            </label>
            <div class="choice-grid">
              <button class="primary choice-button" id="createRoomButton" data-i18n="common.createRoom">创建房间</button>
              <button class="secondary choice-button" id="chooseJoinButton" data-i18n="common.joinRoom">加入房间</button>
            </div>
          </div>

          <div class="online-step hidden" id="onlineJoinStep">
            <div class="step-header">
              <button class="mini" id="joinBackButton" data-i18n="common.back">返回</button>
              <strong data-i18n="common.joinRoom">加入房间</strong>
            </div>
            <label class="field">
              <span data-i18n="common.roomCode">房间码</span>
              <input id="joinCodeInput" maxlength="5" placeholder="输入 5 位房间码" data-i18n-placeholder="common.roomPlaceholder" />
            </label>
            <button class="primary" id="joinRoomButton" data-i18n="common.enterRoom">进入房间</button>
          </div>

          <div class="online-step hidden" id="onlineRoomStep">
            <div class="step-header">
              <button class="mini" id="roomBackButton" data-i18n="common.back">返回</button>
              <strong id="roomStepTitle">房间</strong>
            </div>
            <div class="room-card hidden" id="roomCard">
              <div>
                <span data-i18n="common.room">房间</span>
                <strong id="roomCodeText">-----</strong>
              </div>
              <button class="mini" id="copyRoomButton" title="复制房间码" data-i18n="common.copy">复制</button>
            </div>
            <div class="room-state" id="roomStateText" data-i18n="common.waitingPlayers">等待玩家</div>
          </div>
        </section>

        <section class="players" id="playersList"></section>
      </aside>

      <section class="board-section">
        <header class="topbar panel">
          <div>
            <span class="eyebrow" id="turnEyebrow">第 1 手</span>
            <h2 id="statusTitle">轮到玩家 1</h2>
          </div>
          <div class="toolbox" id="toolbox">
            <button class="tool active" data-tool="move" title="移动棋子"><span class="tool-icon pawn-icon"></span><span data-i18n="common.move">移动</span></button>
            <button class="tool" data-tool="h" title="放置横墙"><span class="tool-icon hwall-icon"></span><span data-i18n="luqiangqi.hwall">横墙</span></button>
            <button class="tool" data-tool="v" title="放置竖墙"><span class="tool-icon vwall-icon"></span><span data-i18n="luqiangqi.vwall">竖墙</span></button>
          </div>
        </header>

        <div class="board-wrap panel">
          <svg id="boardSvg" role="img" aria-label="墙路棋棋盘"></svg>
        </div>
      </section>

      <aside class="panel right-panel">
        <div class="metric-grid">
          <div>
            <span data-i18n="luqiangqi.shortest">最短路</span>
            <strong id="pathMetric">-</strong>
          </div>
          <div>
            <span data-i18n="luqiangqi.wallsLeft">余墙</span>
            <strong id="wallMetric">-</strong>
          </div>
        </div>
        <section>
          <div class="section-title" data-i18n="common.record">记录</div>
          <ol class="log-list" id="logList"></ol>
          <div class="export-tools" data-export-menu-root>
            <button class="export-trigger" type="button" data-export-menu-toggle data-i18n="export.label" aria-expanded="false">导出</button>
            <div class="export-menu" data-export-menu>
              <button type="button" data-export="pdf" data-i18n="export.asPdf">导出为 PDF</button>
              <button type="button" data-export="record" data-i18n="export.asRecord">导出为棋谱</button>
            </div>
          </div>
        </section>
      </aside>
    </main>

    <div class="toast" id="toast"></div>

    <script type="module" src="/preferences.mjs"></script>
    <script type="module" src="./app.mjs"></script>
  </body>
</html>
