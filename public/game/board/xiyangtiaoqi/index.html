<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>西洋跳棋</title>
  <link rel="stylesheet" href="./styles.css?v=20260627d" />
</head>
<body>
  <header class="game-topbar">
    <a class="game-brand" href="/">
      <strong>Small Magellanic Cloud</strong>
      <span data-i18n="nav.board">棋类</span>
    </a>
    <nav class="game-nav" aria-label="游戏导航">
      <a class="game-nav-link" href="/" data-i18n="nav.home">主页</a>
      <a class="site-back" href="/game/board/" data-i18n="nav.board">棋类</a>
      <div class="settings-menu game-settings" data-settings-menu-root>
        <button class="settings-trigger" type="button" data-settings-toggle data-i18n="settings.label" aria-expanded="false" aria-label="设置">设置</button>
        <div class="settings-popover" data-settings-menu>
          <label class="settings-field">
            <span data-i18n="settings.language">语言：</span>
            <select data-language-select aria-label="Language"></select>
          </label>
          <label class="settings-field">
            <span data-i18n="settings.appearance">外观：</span>
            <select data-theme-select aria-label="Appearance"></select>
          </label>
        </div>
      </div>
    </nav>
  </header>
  <main class="app-shell">
    <aside class="side-panel">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <span></span><span></span><span></span><span></span>
        </div>
        <div>
          <h1 data-i18n="xiyangtiaoqi.title">西洋跳棋</h1>
          <p id="modeCaption">人机对弈</p>
        </div>
      </div>

      <div class="mode-tabs" role="tablist" aria-label="模式">
        <button class="mode-button active" data-mode="ai" data-i18n="common.mode.ai">人机</button>
        <button class="mode-button" data-mode="local" data-i18n="common.mode.local">同屏</button>
        <button class="mode-button" data-mode="online" data-i18n="common.mode.online">联机</button>
      </div>

      <section class="control-block" id="aiPanel">
        <label class="field">
          <span data-i18n="common.aiStrength">AI 强度</span>
          <select id="difficultySelect">
            <option value="easy" data-i18n="difficulty.easy">轻松</option>
            <option value="steady" selected data-i18n="difficulty.steady">稳健</option>
            <option value="hard" data-i18n="difficulty.hard">强手</option>
          </select>
        </label>
        <button class="primary" id="newGameButton" data-i18n="common.newGame">新开一局</button>
      </section>

      <section class="control-block hidden" id="localPanel">
        <button class="primary" id="newLocalButton" data-i18n="common.newGame">新开一局</button>
      </section>

      <section class="control-block hidden" id="onlinePanel">
        <div class="online-step" id="onlineHomeStep">
          <label class="field">
            <span data-i18n="common.nickname">昵称</span>
            <input id="onlineNameInput" maxlength="14" placeholder="我的名字" data-i18n-placeholder="common.namePlaceholder" />
          </label>
          <button class="primary" id="createRoomButton" data-i18n="common.createRoom">创建房间</button>
          <button class="secondary" id="showJoinButton" data-i18n="common.joinRoom">加入房间</button>
        </div>

        <div class="online-step hidden" id="onlineJoinStep">
          <div class="step-header">
            <button class="mini" id="joinBackButton" data-i18n="common.back">返回</button>
            <strong data-i18n="common.joinRoom">加入房间</strong>
          </div>
          <label class="field">
            <span data-i18n="common.roomCode">房间码</span>
            <input id="joinCodeInput" maxlength="5" placeholder="ABCDE" data-i18n-placeholder="common.roomPlaceholder" />
          </label>
          <button class="primary" id="joinRoomButton" data-i18n="common.joinRoom">加入</button>
        </div>

        <div class="online-step hidden" id="onlineRoomStep">
          <div class="room-code">
            <span data-i18n="common.room">房间</span>
            <strong id="roomCodeText">-----</strong>
            <button class="mini" id="copyRoomButton" data-i18n="common.copy">复制</button>
          </div>
          <button class="secondary" id="leaveRoomButton" data-i18n="common.leaveRoom">离开房间</button>
        </div>
      </section>

      <div class="players" id="playerCards"></div>
    </aside>

    <section class="game-stage">
      <header class="top-bar">
        <div>
          <p id="turnMeta">第 1 手</p>
          <h2 id="statusTitle">轮到你</h2>
        </div>
        <div class="rule-pills">
          <span id="capturePill" data-i18n="common.mustCapture">必须吃子</span>
          <span id="chainPill" data-i18n="common.chain">连吃</span>
          <span data-i18n="common.king">升王</span>
        </div>
      </header>

      <div class="board-card">
        <div class="board-wrap">
          <div class="board-coords files" aria-hidden="true">
            <span>A</span><span>B</span><span>C</span><span>D</span><span>E</span><span>F</span><span>G</span><span>H</span>
          </div>
          <div class="board-body">
            <div class="board-coords ranks" aria-hidden="true">
              <span>8</span><span>7</span><span>6</span><span>5</span><span>4</span><span>3</span><span>2</span><span>1</span>
            </div>
            <div class="board" id="board" aria-label="西洋跳棋棋盘"></div>
          </div>
        </div>
      </div>
    </section>

    <aside class="info-panel">
      <div class="metrics" id="metrics"></div>
      <section class="log-panel">
        <h2 data-i18n="common.record">记录</h2>
        <div class="log-list" id="logList"></div>
        <div class="export-tools" data-export-menu-root>
          <button class="export-trigger" type="button" data-export-menu-toggle data-i18n="export.label" aria-expanded="false">导出</button>
          <div class="export-menu" data-export-menu>
            <button type="button" data-export="pdf" data-i18n="export.asPdf">导出为 PDF</button>
            <button type="button" data-export="record" data-i18n="export.asRecord">导出为棋谱</button>
          </div>
        </div>
      </section>
    </aside>
  </main>

  <div class="toast" id="toast" role="status"></div>
  <script type="module" src="/preferences.mjs?v=20260627d"></script>
  <script type="module" src="./app.mjs?v=20260627d"></script>
</body>
</html>
