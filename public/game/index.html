<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Game · Small Magellanic Cloud</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="site-shell">
    <header class="site-header">
      <a class="brand" href="/">
        <span class="brand-mark" aria-hidden="true"></span>
        <span class="brand-text"><strong>Small Magellanic Cloud</strong><span>game module</span></span>
      </a>
      <nav class="site-nav trail" aria-label="当前位置">
        <a href="/">Home</a>
        <span>/</span>
        <span class="current">Game</span>
      </nav>
    </header>

    <main class="content-band compact">
      <div class="route-strip" data-reveal>
        <a href="/">Home</a><span>/</span><span>Game</span>
      </div>
      <div class="page-title" data-reveal>
        <p class="eyebrow">game</p>
        <h1>游戏模块</h1>
        <p>互动游戏会按类型收纳。当前启用的是 board，后续可以继续加入策略、谜题、物理模拟或其他实验。</p>
      </div>
      <div class="module-grid">
        <a class="module-card" href="/game/board/" data-reveal>
          <div class="module-meta">
            <span class="tag">Board</span>
            <span class="tag">3 games</span>
          </div>
          <h3>棋类系统</h3>
          <p>路墙棋、西洋跳棋、土耳其跳棋已经整理到同一个模块。</p>
        </a>
      </div>
    </main>
  </div>
  <script type="module" src="/site.mjs"></script>
</body>
</html>
