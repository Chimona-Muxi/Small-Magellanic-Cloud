<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Game · Small Magellanic Cloud</title>
  <link rel="stylesheet" href="/styles.css?v=20260627d" />
</head>
<body>
  <div class="site-shell">
    <header class="site-header">
      <a class="brand" href="/">
        <span class="brand-text"><strong>Small Magellanic Cloud</strong><span>game module</span></span>
      </a>
      <nav class="site-nav trail" aria-label="当前位置">
        <a href="/">Home</a>
        <span>/</span>
        <span class="current">Game</span>
        <div class="settings-menu" data-settings-menu-root>
          <button class="settings-trigger" type="button" data-settings-toggle data-i18n="settings.label" aria-expanded="false" aria-label="设置">设置</button>
          <div class="settings-popover" data-settings-menu>
            <label class="settings-field">
              <span data-i18n="settings.language">语言：</span>
              <select data-language-select aria-label="Language"></select>
            </label>
            <label class="settings-field">
              <span data-i18n="settings.appearance">外观：</span>
              <select data-theme-select aria-label="Appearance"></select>
            </label>
          </div>
        </div>
      </nav>
    </header>

    <main class="content-band compact">
      <div class="route-strip" data-reveal>
        <a href="/">Home</a><span>/</span><span>Game</span>
      </div>
      <div class="page-title" data-reveal>
        <p class="eyebrow">game</p>
        <h1 data-i18n="game.title">游戏模块</h1>
        <p data-i18n="game.copy">互动游戏会按类型收纳。当前启用的是 board，后续可以继续加入策略、谜题、物理模拟或其他实验。</p>
      </div>
      <div class="module-grid">
        <a class="module-card" href="/game/board/" data-reveal>
          <div class="module-meta">
            <span class="tag" data-i18n="nav.board">棋类</span>
            <span class="tag">3 games</span>
          </div>
          <h3 data-i18n="board.title">棋类系统</h3>
          <p data-i18n="game.board.copy">路墙棋、西洋跳棋、土耳其跳棋已经整理到同一个模块。</p>
        </a>
      </div>
    </main>
  </div>
  <script type="module" src="/site.mjs?v=20260627d"></script>
</body>
</html>
